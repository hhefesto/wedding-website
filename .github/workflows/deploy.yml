name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one concurrent deployment; cancel in-progress if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Enable Nix binary cache (reflex-frp + nixos)
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build static website
        run: nix build .#website --out-link ./result

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./result

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
