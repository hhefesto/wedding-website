name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one concurrent deployment; cancel in-progress if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Upload prebuilt static site (built locally) ─────────────────────────────
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify prebuilt site exists
        run: |
          test -f ./site/index.html
          test -f ./site/out.js
          test -f ./site/rts.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
