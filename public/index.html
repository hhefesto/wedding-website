<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Save The Date — Daniel & Cristy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink:       #1a1a1a;
      --ink-mid:   #5a5a5a;
      --ink-light: #9a9a9a;
      --bg:        #f0eee9;
      --surface:   #f8f6f2;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Montserrat', 'Helvetica Neue', sans-serif;
      --script:    'Dancing Script', cursive;
      --nav-h:     80px;
    }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      height: 100%;
      background: var(--bg);
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ─── PAGE ──────────────────────────────────────────── */
    .page {
      background: var(--surface);
    }

    /* ─── NAV ───────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid transparent;
      display: flex;
      align-items: center;
      padding: 0 44px;
      height: var(--nav-h);
      gap: 48px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      animation: fadeDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .nav.scrolled {
      border-color: rgba(26,26,26,0.08);
      box-shadow: 0 2px 16px rgba(26,26,26,0.05);
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .logo-sep {
      font-size: 14px;
      color: var(--ink-mid);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      flex: 1;
    }

    .nav-link {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--ink-mid);
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .nav-direction {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--ink);
      border: 1px solid var(--ink);
      padding: 9px 18px;
      transition: background 0.2s ease, color 0.2s ease;
      white-space: nowrap;
    }

    .nav-direction:hover {
      background: var(--ink);
      color: var(--surface);
    }

    .nav-direction .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .nav-direction:hover .arrow {
      transform: translateX(3px);
    }

    /* ─── HERO ──────────────────────────────────────────── */
    .hero {
      display: flex;
      align-items: stretch;
      padding: 40px 44px 52px;
      gap: 0;
      min-height: calc(100vh - var(--nav-h));
    }

    /* ─── HEADLINE ──────────────────────────────────────── */
    .headline-wrap {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-bottom: 8px;
      min-width: 220px;
      flex-shrink: 0;
    }

    .headline {
      font-family: var(--serif);
      font-size: clamp(68px, 9vw, 110px);
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-top: -6px;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    .couple-names {
      font-family: var(--script);
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 400;
      color: var(--ink-mid);
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-top: 14px;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both;
    }

    .stamp {
      opacity: 0.7;
      margin-left: 4px;
      margin-bottom: 4px;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    /* ─── CARDS ─────────────────────────────────────────── */
    .cards {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 20px;
      padding-left: 40px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
      max-width: 220px;
    }

    .card--featured { max-width: 260px; }

    .card-img-wrap {
      position: relative;
      border-radius: 200px;
      overflow: hidden;
      aspect-ratio: 0.62;
      width: 100%;
      background: #c8c8c4;
    }

    .card--featured .card-img-wrap {
      background: #e8e4dc;
      box-shadow: 0 8px 32px rgba(26,26,26,0.10);
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%) contrast(1.05);
    }

    .card-img--illustration {
      filter: none;
      object-fit: contain;
      object-position: center;
      padding: 8px 8px 0;
      background: #f5f2ec;
    }

    .card-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(to bottom, transparent 40%, rgba(10,10,10,0.45) 100%);
    }

    .card--featured .card-img-wrap::after {
      background: linear-gradient(to bottom, transparent 70%, rgba(10,10,10,0.18) 100%);
    }

    .card-num-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 20px 14px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
    }

    .card-num {
      font-family: var(--serif);
      font-size: clamp(40px, 5vw, 60px);
      font-weight: 300;
      color: rgba(248,246,242,0.9);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 0 4px;
    }

    .card-date {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--ink-light);
      text-transform: uppercase;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .card--featured .card-date  { font-size: 10px; color: var(--ink-mid); }
    .card--featured .card-title { font-family: var(--script); font-size: 18px; letter-spacing: 0.04em; text-transform: none; font-weight: 600; }

    .card:nth-child(1) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both; }
    .card:nth-child(2) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both; }
    .card:nth-child(3) { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both; }

    /* ─── SECTIONS ──────────────────────────────────────── */
    .section {
      padding: 100px 44px;
      border-top: 1px solid rgba(26,26,26,0.08);
    }

    .section--photos,
    .section--menu { background: var(--bg); }

    .section-inner {
      max-width: 860px;
      margin: 0 auto;
    }

    .section-inner--split {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 60px;
      align-items: start;
      max-width: 100%;
    }

    .section-label {
      font-family: var(--serif);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: var(--ink-light);
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--script);
      font-size: clamp(40px, 5vw, 60px);
      font-weight: 400;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 48px;
    }

    /* ─── STORY ─────────────────────────────────────────── */
    .story-body {
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 560px;
    }

    .story-body p {
      font-family: var(--serif);
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-mid);
    }

    /* ─── PHOTOS ────────────────────────────────────────── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .photo-placeholder {
      aspect-ratio: 0.75;
      background: #d8d4cc;
      border-radius: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 20px;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--ink-light);
      text-transform: uppercase;
    }

    /* ─── MENU ──────────────────────────────────────────── */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px 60px;
    }

    .menu-course-name {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--ink-light);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(26,26,26,0.10);
    }

    .menu-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-item {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.3;
    }

    /* ─── CONTACT ───────────────────────────────────────── */
    .contact-body {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .contact-line {
      display: flex;
      gap: 24px;
      align-items: baseline;
      font-family: var(--serif);
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 300;
      color: var(--ink-mid);
    }

    .contact-label {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--ink-light);
      text-transform: uppercase;
      min-width: 60px;
      padding-top: 4px;
    }

    /* ─── DIRECTIONS ────────────────────────────────────── */
    .directions-address {
      font-family: var(--serif);
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 300;
      color: var(--ink-mid);
      margin-bottom: 32px;
    }

    .map-wrap {
      width: 100%;
      height: 460px;
      border-radius: 16px;
      overflow: hidden;
      background: #d8d4cc;
      margin-bottom: 20px;
    }

    .map-external-link {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--ink);
      border: 1px solid var(--ink);
      padding: 9px 18px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .map-external-link:hover {
      background: var(--ink);
      color: var(--surface);
    }

    .map-external-link .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .map-external-link:hover .arrow {
      transform: translateX(3px);
    }

    /* ─── ANIMATIONS ────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
  <script>
    // Add .scrolled class to nav when page is scrolled
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('.nav');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
